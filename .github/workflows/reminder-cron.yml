name: Reminder check (free, every 5 min)

on:
  schedule:
    - cron: '2-59/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/reminder-cron.yml']

jobs:
  remind:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Restore reminder state
        uses: actions/cache/restore@v4
        with:
          path: data
          key: reminder-state-${{ runner.os }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one reminder check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DRY_RUN: "false"
          LOG_LEVEL: INFO
        run: python -m app.main --once

      - name: Save reminder state
        uses: actions/cache/save@v4
        with:
          path: data
          key: reminder-state-${{ runner.os }}
