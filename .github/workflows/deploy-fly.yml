name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          APP_NAME="${{ secrets.FLY_APP_NAME }}"
          if [ -z "$APP_NAME" ]; then APP_NAME="study-reminder-svc"; fi
          flyctl launch --copy-config --yes --no-deploy -a "$APP_NAME" 2>/dev/null || true
          flyctl secrets set DISCORD_WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}" -a "$APP_NAME"
          flyctl deploy --remote-only -a "$APP_NAME"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
