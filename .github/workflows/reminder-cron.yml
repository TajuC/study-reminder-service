# Runs every 5 minutes: GitHub's scheduler triggers on the cron; you can also Run workflow manually or trigger via API.
name: Reminder check (free, every 5 min)

on:
  # GitHub triggers this at :02, :07, :12, :17, :22, :27, :32, :37, :42, :47, :52, :57 UTC (every 5 min)
  schedule:
    - cron: '2-59/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/reminder-cron.yml']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  remind:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Cache reminder state
        uses: actions/cache@v4
        with:
          path: data
          key: reminder-state-${{ runner.os }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one reminder check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DRY_RUN: "false"
          LOG_LEVEL: INFO
        run: mkdir -p data && python -m app.main --once
